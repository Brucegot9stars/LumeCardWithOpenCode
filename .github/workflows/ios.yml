name: iOS CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build iOS Framework
      run: ./gradlew :shared:linkDebugFrameworkIosX64

    - name: Build iOS App
      run: |
        cd iosApp
        xcodebuild -scheme LumeCard -sdk iphonesimulator -configuration Debug build

    - name: Upload iOS artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-build
        path: iosApp/build/
        retention-days: 7
