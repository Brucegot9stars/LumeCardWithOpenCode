name: Windows Desktop CI

on:
  push:
    branches: [ main, develop, feature/* ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build all distributables
        run: .\gradlew.bat :composeApp:createDistributable :composeApp:packageExe :composeApp:packageMsi

      - name: Upload portable app
        uses: actions/upload-artifact@v6
        with:
          name: LumeCard-windows-portable
          path: composeApp/build/compose/binaries/main/app/
          retention-days: 7

      - name: Upload EXE installer
        uses: actions/upload-artifact@v6
        with:
          name: LumeCard-windows-exe
          path: composeApp/build/compose/binaries/main/exe/*.exe
          retention-days: 7

      - name: Upload MSI installer
        uses: actions/upload-artifact@v6
        with:
          name: LumeCard-windows-msi
          path: composeApp/build/compose/binaries/main/msi/*.msi
          retention-days: 7
