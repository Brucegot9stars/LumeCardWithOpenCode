name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          VERSION="${TAG_NAME#v}"
          echo "tag=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Sync version into assets
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CODE=$(grep APP_VERSION_CODE version.properties | cut -d= -f2)
          sed -i "s/^APP_VERSION_NAME=.*/APP_VERSION_NAME=${VERSION}/" composeApp/src/androidMain/assets/version.properties
          sed -i "s/^APP_VERSION_CODE=.*/APP_VERSION_CODE=${CODE}/" composeApp/src/androidMain/assets/version.properties
          echo "Synced assets/version.properties to v${VERSION} (code=${CODE})"

      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > /tmp/release.keystore

      - name: Build Release APK
        env:
          KEYSTORE_FILE: /tmp/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew clean :composeApp:assembleRelease --no-daemon \
            -PVERSION_NAME="${{ steps.version.outputs.version }}" \
            -PKEYSTORE_FILE="${{ env.KEYSTORE_FILE }}" \
            -PKEYSTORE_PASSWORD="${{ env.KEYSTORE_PASSWORD }}" \
            -PKEY_ALIAS="${{ env.KEY_ALIAS }}" \
            -PKEY_PASSWORD="${{ env.KEY_PASSWORD }}"

      - name: Build Release AAB (optional)
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_FILE: /tmp/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew :composeApp:bundleRelease --no-daemon \
            -PVERSION_NAME="${{ steps.version.outputs.version }}" \
            -PKEYSTORE_FILE="${{ env.KEYSTORE_FILE }}" \
            -PKEYSTORE_PASSWORD="${{ env.KEYSTORE_PASSWORD }}" \
            -PKEY_ALIAS="${{ env.KEY_ALIAS }}" \
            -PKEY_PASSWORD="${{ env.KEY_PASSWORD }}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: composeApp/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload AAB artifact
        if: hashFiles('composeApp/build/outputs/bundle/release/*.aab') != ''
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: composeApp/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Generate Release Notes
        id: release_notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          cat > release_notes.md << NOTES_EOF
          # LumeCard ${TAG}

          ## ✨ 新增功能

          - 数据与配置完全分离同步
          - 独立同步按钮（数据/配置/全部）
          - 旧格式自动迁移

          ## 🐛 问题修复

          - 修复自动更新功能
          - 修复 Android 文件选择器
          - 修复更新检查文案与状态逻辑
          - 修复 WebDAV 同步中数据丢失

          ## 🚀 优化改进

          - 完善更新检查对话框
          - 完善导入导出功能
          - 优化设置页面 UI

          **Full Changelog**: https://github.com/Brucegot9stars/LumeCardWithOpenCode/compare/v${{ github.event.before || 'HEAD' }}...${TAG}
          NOTES_EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: LumeCard ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          body_path: release_notes.md
          files: |
            composeApp/build/outputs/apk/release/*.apk
            composeApp/build/outputs/bundle/release/*.aab
