name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          VERSION="${TAG_NAME#v}"
          echo "tag=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Sync version into assets
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CODE=$(grep APP_VERSION_CODE version.properties | cut -d= -f2)
          sed -i "s/^APP_VERSION_NAME=.*/APP_VERSION_NAME=${VERSION}/" composeApp/src/androidMain/assets/version.properties
          sed -i "s/^APP_VERSION_CODE=.*/APP_VERSION_CODE=${CODE}/" composeApp/src/androidMain/assets/version.properties
          echo "Synced assets/version.properties to v${VERSION} (code=${CODE})"

      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > /tmp/release.keystore

      - name: Build Release APK
        env:
          KEYSTORE_FILE: /tmp/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew clean :composeApp:assembleRelease --no-daemon \
            -PVERSION_NAME="${{ steps.version.outputs.version }}" \
            -PKEYSTORE_FILE="${{ env.KEYSTORE_FILE }}" \
            -PKEYSTORE_PASSWORD="${{ env.KEYSTORE_PASSWORD }}" \
            -PKEY_ALIAS="${{ env.KEY_ALIAS }}" \
            -PKEY_PASSWORD="${{ env.KEY_PASSWORD }}"

      - name: Build Release AAB (optional)
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_FILE: /tmp/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew :composeApp:bundleRelease --no-daemon \
            -PVERSION_NAME="${{ steps.version.outputs.version }}" \
            -PKEYSTORE_FILE="${{ env.KEYSTORE_FILE }}" \
            -PKEYSTORE_PASSWORD="${{ env.KEYSTORE_PASSWORD }}" \
            -PKEY_ALIAS="${{ env.KEY_ALIAS }}" \
            -PKEY_PASSWORD="${{ env.KEY_PASSWORD }}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: composeApp/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload AAB artifact
        if: hashFiles('composeApp/build/outputs/bundle/release/*.aab') != ''
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: composeApp/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Generate Release Notes
        id: release_notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"

          # Find previous tag
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -2 | tail -1)

          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${TAG}"
            LOG_FORMAT="- %s (%h)"
          else
            RANGE="${TAG}"
            LOG_FORMAT="- %s (%h)"
          fi

          # Categorize commits
          FEATURES=$(git log "$RANGE" --pretty=format:"$LOG_FORMAT" --no-merges | grep -iE '^[^-]*-(feat|add|new|feature)' || true)
          FIXES=$(git log "$RANGE" --pretty=format:"$LOG_FORMAT" --no-merges | grep -iE '^[^-]*-(fix|bug|patch|resolve)' || true)
          IMPROVE=$(git log "$RANGE" --pretty=format:"$LOG_FORMAT" --no-merges | grep -iE '^[^-]*-(improv|optim|refactor|perf|clean|style|update|bump|chore)' || true)
          OTHER=$(git log "$RANGE" --pretty=format:"$LOG_FORMAT" --no-merges | grep -viE '^[^-]*-(feat|add|new|feature|fix|bug|patch|resolve|improv|optim|refactor|perf|clean|style|update|bump|chore)' || true)

          cat > release_notes.md << NOTES_EOF
          # LumeCard ${TAG}

          ## What's Changed since ${PREV_TAG:-initial release}

          NOTES_EOF

          if [ -n "$FEATURES" ]; then
            echo "### ✨ New Features" >> release_notes.md
            echo "" >> release_notes.md
            echo "$FEATURES" >> release_notes.md
            echo "" >> release_notes.md
          fi

          if [ -n "$FIXES" ]; then
            echo "### 🐛 Bug Fixes" >> release_notes.md
            echo "" >> release_notes.md
            echo "$FIXES" >> release_notes.md
            echo "" >> release_notes.md
          fi

          if [ -n "$IMPROVE" ]; then
            echo "### 🔧 Improvements" >> release_notes.md
            echo "" >> release_notes.md
            echo "$IMPROVE" >> release_notes.md
            echo "" >> release_notes.md
          fi

          if [ -n "$OTHER" ]; then
            echo "### 📦 Other Changes" >> release_notes.md
            echo "" >> release_notes.md
            echo "$OTHER" >> release_notes.md
            echo "" >> release_notes.md
          fi

          # If no categorized commits found, show all
          if [ -z "$FEATURES" ] && [ -z "$FIXES" ] && [ -z "$IMPROVE" ] && [ -z "$OTHER" ]; then
            echo "### 📝 Commits" >> release_notes.md
            echo "" >> release_notes.md
            git log "$RANGE" --pretty=format:"- %s (%h)" --no-merges >> release_notes.md
            echo "" >> release_notes.md
          fi

          echo "---" >> release_notes.md
          echo "" >> release_notes.md
          echo "**Full Changelog**: https://github.com/Brucegot9stars/LumeCardWithOpenCode/compare/${PREV_TAG:-$(git rev-list --max-parents=0 HEAD | head -1)}...${TAG}" >> release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: LumeCard ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          body_path: release_notes.md
          files: |
            composeApp/build/outputs/apk/release/*.apk
            composeApp/build/outputs/bundle/release/*.aab
