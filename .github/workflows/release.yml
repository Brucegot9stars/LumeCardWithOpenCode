name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          VERSION="${TAG_NAME#v}"
          echo "tag=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew :shared:desktopTest

      - name: Sync version into all platform assets
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CODE=$(grep APP_VERSION_CODE version.properties | cut -d= -f2)
          for f in composeApp/src/androidMain/assets/version.properties composeApp/src/desktopMain/resources/version.properties version.properties; do
            sed -i "s/^APP_VERSION_NAME=.*/APP_VERSION_NAME=${VERSION}/" "$f"
            sed -i "s/^APP_VERSION_CODE=.*/APP_VERSION_CODE=${CODE}/" "$f"
          done
          echo "Synced all version.properties to v${VERSION} (code=${CODE})"

      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > /tmp/release.keystore

      - name: Build Release APK
        env:
          KEYSTORE_FILE: /tmp/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew clean :composeApp:assembleRelease --no-daemon \
            -PVERSION_NAME="${{ steps.version.outputs.version }}" \
            -PKEYSTORE_FILE="${{ env.KEYSTORE_FILE }}" \
            -PKEYSTORE_PASSWORD="${{ env.KEYSTORE_PASSWORD }}" \
            -PKEY_ALIAS="${{ env.KEY_ALIAS }}" \
            -PKEY_PASSWORD="${{ env.KEY_PASSWORD }}"

      - name: Build Release AAB (optional)
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_FILE: /tmp/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew :composeApp:bundleRelease --no-daemon \
            -PVERSION_NAME="${{ steps.version.outputs.version }}" \
            -PKEYSTORE_FILE="${{ env.KEYSTORE_FILE }}" \
            -PKEYSTORE_PASSWORD="${{ env.KEYSTORE_PASSWORD }}" \
            -PKEY_ALIAS="${{ env.KEY_ALIAS }}" \
            -PKEY_PASSWORD="${{ env.KEY_PASSWORD }}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-apk
          path: composeApp/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload AAB artifact
        if: hashFiles('composeApp/build/outputs/bundle/release/*.aab') != ''
        uses: actions/upload-artifact@v6
        with:
          name: release-aab
          path: composeApp/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Generate Release Notes
        id: release_notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"

          # Find previous tag
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | grep -v "^${TAG}$" | head -1)

          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${TAG}"
          else
            RANGE="${TAG}"
          fi

          LOG_FORMAT="- %s (%h)"
          ALL_COMMITS=$(git log "$RANGE" --pretty=format:"$LOG_FORMAT" --no-merges 2>/dev/null || echo "")

          if [ -z "$ALL_COMMITS" ]; then
            # If no commits in range, try all history
            ALL_COMMITS=$(git log --pretty=format:"$LOG_FORMAT" --no-merges -20 2>/dev/null || echo "")
          fi

          # Categorize commits by conventional prefix
          FEATURES=$(echo "$ALL_COMMITS" | grep -iE 'feat|add new|feature' || true)
          FIXES=$(echo "$ALL_COMMITS" | grep -iE 'fix|bug|patch|resolve' || true)
          IMPROVE=$(echo "$ALL_COMMITS" | grep -iE 'improv|optim|refactor|perf|clean|style|update|bump|chore' || true)

          # OTHER = commits not matching any category
          OTHER=$(echo "$ALL_COMMITS" | grep -viE 'feat|add new|feature|fix|bug|patch|resolve|improv|optim|refactor|perf|clean|style|update|bump|chore' || true)

          {
            echo "# LumeCard ${TAG}"
            echo ""
            echo "## What Changed since ${PREV_TAG:-initial release}"
            echo ""

            if [ -n "$FEATURES" ]; then
              echo "### ✨ New Features"
              echo ""
              echo "$FEATURES"
              echo ""
            fi

            if [ -n "$FIXES" ]; then
              echo "### 🐛 Bug Fixes"
              echo ""
              echo "$FIXES"
              echo ""
            fi

            if [ -n "$IMPROVE" ]; then
              echo "### 🔧 Improvements"
              echo ""
              echo "$IMPROVE"
              echo ""
            fi

            if [ -n "$OTHER" ]; then
              echo "### 📦 Other Changes"
              echo ""
              echo "$OTHER"
              echo ""
            fi

            echo "---"
            echo ""
            FIRST_COMMIT=$(git rev-list --max-parents=0 HEAD 2>/dev/null | head -1)
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG:-$FIRST_COMMIT}...${TAG}"
          } > release_notes.md

          echo "=== Release Notes ==="
          cat release_notes.md
          echo "====================="

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: LumeCard ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          body_path: release_notes.md
          files: |
            composeApp/build/outputs/apk/release/*.apk
            composeApp/build/outputs/bundle/release/*.aab
