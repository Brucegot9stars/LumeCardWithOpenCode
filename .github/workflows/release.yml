name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          VERSION="${TAG_NAME#v}"
          echo "tag=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > /tmp/release.keystore

      - name: Build Release APK
        env:
          KEYSTORE_FILE: /tmp/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew clean :composeApp:assembleRelease --no-daemon \
            -PVERSION_NAME="${{ steps.version.outputs.version }}" \
            -PKEYSTORE_FILE="${{ env.KEYSTORE_FILE }}" \
            -PKEYSTORE_PASSWORD="${{ env.KEYSTORE_PASSWORD }}" \
            -PKEY_ALIAS="${{ env.KEY_ALIAS }}" \
            -PKEY_PASSWORD="${{ env.KEY_PASSWORD }}"

      - name: Build Release AAB (optional)
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_FILE: /tmp/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew :composeApp:bundleRelease --no-daemon \
            -PVERSION_NAME="${{ steps.version.outputs.version }}" \
            -PKEYSTORE_FILE="${{ env.KEYSTORE_FILE }}" \
            -PKEYSTORE_PASSWORD="${{ env.KEYSTORE_PASSWORD }}" \
            -PKEY_ALIAS="${{ env.KEY_ALIAS }}" \
            -PKEY_PASSWORD="${{ env.KEY_PASSWORD }}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: composeApp/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload AAB artifact
        if: hashFiles('composeApp/build/outputs/bundle/release/*.aab') != ''
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: composeApp/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            composeApp/build/outputs/apk/release/*.apk
            composeApp/build/outputs/bundle/release/*.aab
